version: "3.9"

# Rede isolada para não interferir com o projeto casamento (casamento_default / r4net)
networks:
  apienvios_net:
    driver: bridge

services:
  # ── Banco de dados dedicado ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: apienvios_postgres
    restart: unless-stopped
    networks:
      - apienvios_net
    environment:
      POSTGRES_USER: apienvios
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: apienvios
    ports:
      - "5433:5432"   # 5432 ocupado pelo r4server (casamento)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apienvios"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache e filas ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: apienvios_redis
    restart: unless-stopped
    networks:
      - apienvios_net
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Provider 1: Evolution API ───────────────────────────────
  evolution_api:
    image: atendai/evolution-api:latest
    container_name: apienvios_evolution
    restart: unless-stopped
    networks:
      - apienvios_net
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_API_KEY: evolution-key-dev-123
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://apienvios:senha123@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      QRCODE_LIMIT: 30
      DEL_INSTANCE: "false"
      LOG_LEVEL: ERROR
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1035194821"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Provider 2: WAHA ────────────────────────────────────────
  waha:
    image: devlikeapro/waha:latest
    container_name: apienvios_waha
    restart: unless-stopped
    networks:
      - apienvios_net
    ports:
      - "3078:3000"
    environment:
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      WAHA_PRINT_QR: "false"
      WAHA_API_KEY: "1c76189c459b4d90972c2fdea52de530"
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: admin123
      WAHA_DASHBOARD_API_KEY: "1c76189c459b4d90972c2fdea52de530"
    volumes:
      - waha_data:/app/.sessions

  # ── Aplicação principal ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: apienvios_app
    restart: unless-stopped
    networks:
      - apienvios_net
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      PUBLIC_BASE_URL: http://app:3002
      API_SECRET: apienvios-dev-secret-2026-xK9mP3qR
      JWT_SECRET: apienvios-dev-jwt-secret-2026-zQ7wL2nT
      JWT_EXPIRES_IN: 7d
      # Endereços internos Docker (sobrepõem o .env)
      DATABASE_URL: postgresql://apienvios:senha123@postgres:5432/apienvios
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      EVOLUTION_API_URL: http://evolution_api:8080
      EVOLUTION_API_KEY: evolution-key-dev-123
      WAHA_URL: http://waha:3000
      WAHA_API_KEY: "1c76189c459b4d90972c2fdea52de530"
      WA_CLOUD_TOKEN: ""
      WA_CLOUD_PHONE_NUMBER_ID: ""
      WA_CLOUD_BUSINESS_ACCOUNT_ID: ""
      BAN_WEBHOOK_URL: ""
      ALERT_EMAIL: ""
      SEND_DELAY_MIN: "2000"
      SEND_DELAY_MAX: "5000"
      MAX_MESSAGES_PER_NUMBER_DAY: "200"
      ADMIN_SEED_EMAIL: otavio.silva1661@gmail.com
      ADMIN_SEED_PASSWORD: admin123
      ADMIN_SEED_NAME: Otavio Silva
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  waha_data:
